# ═══════════════════════════════════════════════════
# iCloush 智慧工厂 — Docker Compose（本地开发）
# ═══════════════════════════════════════════════════
# 注意：如果 Docker Hub 拉取镜像超时，请先配置镜像加速器：
# Docker Desktop → Settings → Docker Engine → 添加：
# "registry-mirrors": ["https://docker.1ms.run", "https://docker.xuanyuan.me"]

services:
  # ── FastAPI 后端 ──
  api:
    build: .
    container_name: icloush-api
    ports:
      - "8000:80"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app  # 开发时热重载

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: icloush-db
    environment:
      POSTGRES_USER: icloush
      POSTGRES_PASSWORD: ${DB_PASSWORD:-icloush_dev_2026}
      POSTGRES_DB: icloush_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icloush"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: icloush-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
